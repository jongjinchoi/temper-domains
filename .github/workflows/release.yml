name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            os: macos-latest
          - target: bun-darwin-x64
            os: macos-latest
          - target: bun-linux-x64
            os: ubuntu-latest
          - target: bun-linux-arm64
            os: ubuntu-latest
          - target: bun-windows-x64
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun build --compile --target=${{ matrix.target }} --minify --sourcemap ./src/index.ts --outfile dist/temper-${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: temper-${{ matrix.target }}
          path: dist/temper-${{ matrix.target }}*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/temper-*
          generate_release_notes: true
