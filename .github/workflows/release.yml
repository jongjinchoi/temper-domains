name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bunx tsc --noEmit

  build:
    needs: typecheck
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            os: macos-latest
          - target: bun-darwin-x64
            os: macos-latest
          - target: bun-linux-x64
            os: ubuntu-latest
          - target: bun-linux-arm64
            os: ubuntu-latest
          - target: bun-windows-x64
            os: ubuntu-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Build binary
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          mkdir -p dist
          bun build --compile --target=${{ matrix.target }} --minify --sourcemap --define PKG_VERSION="\"$VERSION\"" ./src/index.ts --outfile dist/temper
          cd dist && tar -czf temper-${{ matrix.target }}.tar.gz temper
      - uses: actions/upload-artifact@v4
        with:
          name: temper-${{ matrix.target }}
          path: dist/temper-${{ matrix.target }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/temper-*.tar.gz
          generate_release_notes: true

  npm:
    needs: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - run: bun install
      - run: bun run build:npm
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  homebrew:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: jongjinchoi/homebrew-temper-domains
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
      - name: Update formula
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          BASE_URL="https://github.com/jongjinchoi/temper-domains/releases/download/v${VERSION}"

          SHA_DARWIN_ARM64=$(curl -sL "${BASE_URL}/temper-bun-darwin-arm64.tar.gz" | shasum -a 256 | awk '{print $1}')
          SHA_DARWIN_X64=$(curl -sL "${BASE_URL}/temper-bun-darwin-x64.tar.gz" | shasum -a 256 | awk '{print $1}')
          SHA_LINUX_X64=$(curl -sL "${BASE_URL}/temper-bun-linux-x64.tar.gz" | shasum -a 256 | awk '{print $1}')
          SHA_LINUX_ARM64=$(curl -sL "${BASE_URL}/temper-bun-linux-arm64.tar.gz" | shasum -a 256 | awk '{print $1}')

          cat > Formula/temper.rb << EOF
          class Temper < Formula
            desc "Never leave your terminal to find a domain"
            homepage "https://github.com/jongjinchoi/temper-domains"
            version "${VERSION}"

            on_macos do
              if Hardware::CPU.arm?
                url "${BASE_URL}/temper-bun-darwin-arm64.tar.gz"
                sha256 "${SHA_DARWIN_ARM64}"
              else
                url "${BASE_URL}/temper-bun-darwin-x64.tar.gz"
                sha256 "${SHA_DARWIN_X64}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "${BASE_URL}/temper-bun-linux-arm64.tar.gz"
                sha256 "${SHA_LINUX_ARM64}"
              else
                url "${BASE_URL}/temper-bun-linux-x64.tar.gz"
                sha256 "${SHA_LINUX_X64}"
              end
            end

            def install
              bin.install "temper"
            end

            test do
              system "#{bin}/temper", "--version"
            end
          end
          EOF
      - name: Commit and push
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/temper.rb
          git diff --cached --quiet || (git commit -m "temper ${VERSION}" && git push)
