<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 640" width="1280" height="640">
  <defs>
    <radialGradient id="grad" cx="0.85" cy="0.2" r="0.6">
      <stop offset="0" stop-color="#e8461a" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#e8461a" stop-opacity="0"/>
    </radialGradient>
    <pattern id="scanlines" patternUnits="userSpaceOnUse" width="3" height="3">
      <rect width="3" height="2" fill="transparent"/>
      <rect y="2" width="3" height="1" fill="rgba(0,0,0,0.15)"/>
    </pattern>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0.5" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0.35"/>
    </radialGradient>
  </defs>

  <!-- Background + subtle accent gradient -->
  <rect width="1280" height="640" fill="#f3ead3"/>
  <rect width="1280" height="640" fill="url(#grad)"/>

  <!-- ═══════ LEFT COLUMN ═══════ -->

  <!-- Brand: logo + wordmark -->
  <g transform="translate(70, 78)">
    <!-- Logo tile (rotate -2deg around center of 72×72) -->
    <g transform="rotate(-2 36 36)">
      <rect x="4" y="4" width="72" height="72" rx="12" fill="#1b3a5c"/>
      <rect width="72" height="72" rx="12" fill="#e8461a"/>
      <g transform="scale(2.25)">
        <path d="M21.23 24.80L15.95 24.80Q15.09 24.80 14.55 24.25Q14.01 23.69 14.01 22.84L14.01 22.84L14.01 15.35L10.32 15.35L10.32 12.33L14.01 12.33L14.01 7.20L17.18 7.20L17.18 12.33L21.68 12.33L21.68 15.35L17.18 15.35L17.18 21.03Q17.18 21.78 17.86 21.78L17.86 21.78L21.23 21.78L21.23 24.80Z" fill="#faf3df"/>
      </g>
    </g>
    <!-- Wordmark -->
    <text x="100" y="58" font-family="Space Grotesk" font-size="56" font-weight="700" letter-spacing="-1" fill="#1e1a1f">temper</text>
    <text x="325" y="52" font-family="JetBrains Mono" font-size="17" font-weight="400" fill="#7a705c">/ domains</text>
  </g>

  <!-- Headline (uppercase, 3 lines) -->
  <text x="70" y="252" font-family="Space Grotesk" font-size="54" font-weight="700" letter-spacing="-1.2" fill="#1e1a1f">NEVER LEAVE YOUR</text>
  <text x="70" y="313" font-family="Space Grotesk" font-size="54" font-weight="700" letter-spacing="-1.2" fill="#1e1a1f">TERMINAL TO FIND A</text>
  <text x="70" y="374" font-family="Space Grotesk" font-size="54" font-weight="700" letter-spacing="-1.2" font-style="italic" fill="#e8461a">DOMAIN.</text>

  <!-- Tagline (2 lines, with flame highlight on "30 TLDs") -->
  <g font-family="JetBrains Mono" font-size="15" fill="#1e1a1f">
    <text x="70" y="470">A terminal-first domain search.</text>
    <rect x="66" y="485" width="82" height="22" fill="#e8461a"/>
    <text x="70" y="501" font-weight="700" fill="#faf3df">30 TLDs</text>
    <text x="156" y="501"> in under 2 seconds. MCP-</text>
    <text x="70" y="526">native for Claude and Cursor.</text>
  </g>

  <!-- ═══════ RIGHT COLUMN — CRT ═══════ -->

  <g transform="translate(695, 130) rotate(1.2)">
    <!-- flame shadow offset 8,8 -->
    <rect x="8" y="8" width="520" height="380" fill="#e8461a"/>
    <!-- CRT screen -->
    <rect width="520" height="380" fill="#1e1a1f" stroke="#1e1a1f" stroke-width="3"/>

    <!-- Terminal text -->
    <g font-family="VT323" font-size="24" fill="#ff7a3d">
      <text x="26" y="46"><tspan fill="#e8461a" font-weight="700">&gt;</tspan> temper search dashflow</text>
      <text x="26" y="78" fill="#8a7a5c">  30 TLDs · 1.4s</text>

      <text x="26" y="140">  dashflow.com   <tspan fill="#ff7070">[taken]</tspan></text>
      <text x="26" y="170">  dashflow.io    <tspan fill="#c5e860">[available]</tspan></text>
      <text x="26" y="200">  dashflow.dev   <tspan fill="#c5e860">[available]</tspan></text>
      <text x="26" y="230">  dashflow.app   <tspan fill="#c5e860">[available]</tspan></text>
      <text x="26" y="260">  dashflow.ai    <tspan fill="#ff7070">[taken]</tspan></text>
      <text x="26" y="290">  dashflow.co    <tspan fill="#c5e860">[available]</tspan></text>
      <text x="26" y="320">  dashflow.sh    <tspan fill="#c5e860">[available]</tspan></text>

      <text x="26" y="360" fill="#8a7a5c">  ── 13 available · 3 taken</text>
    </g>

    <!-- Scanlines + vignette overlays -->
    <rect width="520" height="380" fill="url(#scanlines)"/>
    <rect width="520" height="380" fill="url(#vignette)"/>
  </g>
</svg>
